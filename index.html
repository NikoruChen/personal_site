<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>六格</title>
    <meta name="description" content="关于折腾、旅行，和我在读的书。">
    <style>
        :root {
            --bg: #ffffff;
            --text: #1a1a1a;
            --muted: #6b6b6b;
            --accent: #1a1a1a;
            --line: #ececec;
            --maxw: 880px;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #111111;
                --text: #ededed;
                --muted: #9a9a9a;
                --accent: #ffffff;
                --line: #262626;
            }
        }

        * { box-sizing: border-box; }

        html { -webkit-text-size-adjust: 100%; }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            font-size: 18px;
            line-height: 1.65;
            -webkit-font-smoothing: antialiased;
        }

        .wrap {
            max-width: var(--maxw);
            margin: 0 auto;
            padding: 0 24px;
        }

        /* Header */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 36px 0 0;
        }

        .brand {
            font-weight: 700;
            font-size: 18px;
            letter-spacing: -0.01em;
            color: var(--text);
            text-decoration: none;
        }

        nav a {
            color: var(--muted);
            text-decoration: none;
            font-size: 15px;
            margin-left: 22px;
        }
        nav a:hover { color: var(--text); }

        /* Intro */
        .intro {
            padding: 64px 0 40px;
            border-bottom: 1px solid var(--line);
        }
        .intro h1 {
            font-size: 40px;
            line-height: 1.15;
            letter-spacing: -0.03em;
            margin: 0 0 16px;
            font-weight: 800;
        }
        .intro p {
            margin: 0;
            color: var(--muted);
            font-size: 19px;
        }

        /* Post list (cards) */
        .posts {
            padding: 8px 0 64px;
            display: grid;
            gap: 32px;
        }

        .post-card {
            display: block;
            text-decoration: none;
            color: inherit;
            border: 1px solid var(--line);
            border-radius: 16px;
            overflow: hidden;
            background: var(--bg);
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
            transition: box-shadow 0.18s ease, transform 0.18s ease;
        }
        .post-card:hover {
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.10);
            transform: translateY(-2px);
        }

        .card-banner {
            aspect-ratio: 16 / 7;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
            color: #2a2a2a;
        }
        .banner-icon { font-size: 34px; line-height: 1; margin-bottom: 14px; }
        .banner-title {
            font-family: Georgia, "Times New Roman", serif;
            font-size: 30px;
            font-weight: 700;
            line-height: 1.2;
            letter-spacing: -0.01em;
            max-width: 90%;
        }

        .card-body { padding: 24px 26px 26px; }

        .post-meta {
            font-size: 13px;
            letter-spacing: 0.04em;
            color: var(--muted);
            margin-bottom: 8px;
        }
        .post-title {
            font-size: 23px;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin: 0 0 10px;
            transition: color 0.15s ease;
        }
        .post-card:hover .post-title { color: var(--muted); }
        .post-desc {
            margin: 0 0 16px;
            color: var(--muted);
            font-size: 17px;
            line-height: 1.6;
        }
        .read-link {
            font-size: 15px;
            font-weight: 600;
            color: var(--text);
        }
        .post-card:hover .read-link { color: var(--muted); }

        /* Search */
        .search {
            position: relative;
            padding-top: 24px;
        }
        .search-input {
            width: 100%;
            font: inherit;
            font-size: 16px;
            color: var(--text);
            background: var(--bg);
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 12px 16px;
            outline: none;
        }
        .search-input::placeholder { color: var(--muted); }
        .search-input:focus { border-color: var(--muted); }

        .dropdown {
            position: absolute;
            left: 0;
            right: 0;
            top: calc(100% + 6px);
            background: var(--bg);
            border: 1px solid var(--line);
            border-radius: 10px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            z-index: 10;
        }
        .dropdown-item {
            display: block;
            text-decoration: none;
            color: inherit;
            padding: 12px 16px;
            border-bottom: 1px solid var(--line);
        }
        .dropdown-item:last-child { border-bottom: none; }
        .dropdown-item:hover,
        .dropdown-item.active { background: var(--line); }
        .dropdown-item .d-title {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 2px;
        }
        .dropdown-item .d-snippet {
            font-size: 14px;
            line-height: 1.5;
            color: var(--muted);
            margin-bottom: 4px;
        }
        .dropdown-item .d-meta {
            font-size: 12px;
            color: var(--muted);
        }
        .dropdown-empty {
            padding: 14px 16px;
            color: var(--muted);
            font-size: 15px;
        }
        .dropdown mark {
            background: transparent;
            color: var(--text);
            font-weight: 700;
        }

        /* Article reader */
        article {
            padding: 56px 0 80px;
        }
        article .post-meta { margin-bottom: 14px; }
        article h1 {
            font-size: 36px;
            line-height: 1.2;
            letter-spacing: -0.03em;
            margin: 0 0 32px;
            font-weight: 800;
        }
        article h2 {
            font-size: 24px;
            letter-spacing: -0.02em;
            margin: 40px 0 12px;
        }
        article p { margin: 0 0 20px; }
        article ul { padding-left: 22px; margin: 0 0 20px; }
        article li { margin-bottom: 8px; }
        article strong { font-weight: 700; }
        article a { color: var(--text); }

        .back {
            display: inline-block;
            margin: 8px 0 8px;
            color: var(--muted);
            text-decoration: none;
            font-size: 15px;
        }
        .back:hover { color: var(--text); }

        footer {
            padding: 32px 0 56px;
            color: var(--muted);
            font-size: 14px;
        }
        footer a { color: var(--muted); text-decoration: none; }
        footer a:hover { color: var(--text); }

        .loading { color: var(--muted); padding: 40px 0; }

        @media (max-width: 600px) {
            article h1 { font-size: 28px; }
        }
    </style>
</head>
<body>
    <div class="wrap">
        <header>
            <a class="brand" href="#/">六格</a>
            <nav></nav>
        </header>

        <main id="app">
            <p class="loading">加载中…</p>
        </main>

        <footer>
            <span>© <span id="year"></span> 六格</span>
        </footer>
    </div>

    <script>
        const POSTS_DIR = "posts";
        const app = document.getElementById("app");
        document.getElementById("year").textContent = new Date().getFullYear();

        // --- tiny markdown -> HTML (headings, lists, bold, links, paragraphs) ---
        function escapeHtml(s) {
            return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }
        function inline(s) {
            return escapeHtml(s)
                .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
                .replace(/\*(.+?)\*/g, "<em>$1</em>")
                .replace(/\[(.+?)\]\((.+?)\)/g, '<a href="$2">$1</a>');
        }
        function renderMarkdown(md) {
            const lines = md.split("\n");
            let html = "", inList = false;
            const closeList = () => { if (inList) { html += "</ul>"; inList = false; } };
            for (let raw of lines) {
                const line = raw.trimEnd();
                if (/^###\s+/.test(line)) { closeList(); html += "<h3>" + inline(line.replace(/^###\s+/, "")) + "</h3>"; }
                else if (/^##\s+/.test(line)) { closeList(); html += "<h2>" + inline(line.replace(/^##\s+/, "")) + "</h2>"; }
                else if (/^#\s+/.test(line)) { closeList(); html += "<h1>" + inline(line.replace(/^#\s+/, "")) + "</h1>"; }
                else if (/^[-*]\s+/.test(line)) {
                    if (!inList) { html += "<ul>"; inList = true; }
                    html += "<li>" + inline(line.replace(/^[-*]\s+/, "")) + "</li>";
                }
                else if (line.trim() === "") { closeList(); }
                else { closeList(); html += "<p>" + inline(line) + "</p>"; }
            }
            closeList();
            return html;
        }

        // --- frontmatter parsing ---
        function parsePost(text) {
            const m = text.match(/^---\n([\s\S]*?)\n---\n?([\s\S]*)$/);
            const meta = {};
            let body = text;
            if (m) {
                m[1].split("\n").forEach(l => {
                    const i = l.indexOf(":");
                    if (i > -1) meta[l.slice(0, i).trim()] = l.slice(i + 1).trim();
                });
                body = m[2];
            }
            return { meta, body };
        }

        function fmtDate(s) {
            const d = new Date(s);
            if (isNaN(d)) return s;
            return d.toLocaleDateString("zh-CN", { year: "numeric", month: "long", day: "numeric" });
        }

        let cache = null;
        async function loadPosts() {
            if (cache) return cache;
            const files = await fetch(`${POSTS_DIR}/index.json`).then(r => r.json());
            const posts = await Promise.all(files.map(async file => {
                const text = await fetch(`${POSTS_DIR}/${file}`).then(r => r.text());
                const { meta, body } = parsePost(text);
                return { slug: file.replace(/\.md$/, ""), file, meta, body };
            }));
            posts.sort((a, b) => new Date(b.meta.date) - new Date(a.meta.date));
            cache = posts;
            return posts;
        }

        function highlight(text, query) {
            const safe = escapeHtml(text);
            if (!query) return safe;
            const i = text.toLowerCase().indexOf(query.toLowerCase());
            if (i < 0) return safe;
            return escapeHtml(text.slice(0, i)) +
                "<mark>" + escapeHtml(text.slice(i, i + query.length)) + "</mark>" +
                escapeHtml(text.slice(i + query.length));
        }

        // Split into "words": each CJK character is one word, latin/number runs are one word.
        function tokenize(text) {
            const tokens = [];
            const re = /[㐀-鿿぀-ヿ]|[A-Za-z0-9]+/g;
            let m;
            while ((m = re.exec(text)) !== null) {
                tokens.push({ start: m.index, end: m.index + m[0].length });
            }
            return tokens;
        }

        // Build a snippet: ~5 words before/after the match, with the match highlighted.
        function snippetFor(text, query, ctx = 5) {
            if (!text || !query) return null;
            const i = text.toLowerCase().indexOf(query.toLowerCase());
            if (i < 0) return null;
            const mStart = i, mEnd = i + query.length;
            const tokens = tokenize(text);
            let first = tokens.findIndex(t => t.end > mStart);
            let last = -1;
            for (let k = 0; k < tokens.length && tokens[k].start < mEnd; k++) last = k;
            if (first < 0) first = 0;
            if (last < 0) last = tokens.length - 1;
            let s = tokens.length ? tokens[Math.max(0, first - ctx)].start : 0;
            let e = tokens.length ? tokens[Math.min(tokens.length - 1, last + ctx)].end : text.length;
            s = Math.min(s, mStart);
            e = Math.max(e, mEnd);
            const clean = str => str.replace(/\s+/g, " ");
            return (s > 0 ? "…" : "") +
                escapeHtml(clean(text.slice(s, mStart))) +
                "<mark>" + escapeHtml(clean(text.slice(mStart, mEnd))) + "</mark>" +
                escapeHtml(clean(text.slice(mEnd, e))) +
                (e < text.length ? "…" : "");
        }

        function searchPosts(posts, query) {
            const q = query.trim().toLowerCase();
            if (!q) return [];
            return posts.filter(p => {
                const hay = [p.meta.title, p.meta.description, p.meta.category, p.body]
                    .filter(Boolean).join(" ").toLowerCase();
                return hay.includes(q);
            });
        }

        // Banner look per category: icon + soft gradient background.
        const CARD_STYLES = {
            "随笔": { icon: "✍️", bg: "linear-gradient(135deg, #fdf0e3, #f6dcc4)" },
            "折腾": { icon: "🔧", bg: "linear-gradient(135deg, #e6eefb, #cfe0f6)" },
            "旅行": { icon: "✈️", bg: "linear-gradient(135deg, #e4f4ec, #c6e8d6)" },
            "阅读": { icon: "📖", bg: "linear-gradient(135deg, #f3e9fb, #e0cdf2)" },
        };
        const DEFAULT_STYLE = { icon: "📝", bg: "linear-gradient(135deg, #f0f0f0, #dcdcdc)" };
        function cardStyle(category) { return CARD_STYLES[category] || DEFAULT_STYLE; }

        function renderList(posts) {
            app.innerHTML = `
                <div class="search">
                    <input class="search-input" type="search" id="search" placeholder="搜索文章…" autocomplete="off">
                    <div class="dropdown" id="dropdown" hidden></div>
                </div>
                <section class="posts" style="padding-top:24px">
                    ${posts.map(p => {
                        const s = cardStyle(p.meta.category);
                        return `
                        <a class="post-card" href="#/post/${p.slug}">
                            <div class="card-banner" style="background:${s.bg}">
                                <div class="banner-icon">${s.icon}</div>
                                <div class="banner-title">${escapeHtml(p.meta.title || p.slug)}</div>
                            </div>
                            <div class="card-body">
                                <div class="post-meta">${fmtDate(p.meta.date)}${p.meta.category ? " · " + escapeHtml(p.meta.category) : ""}</div>
                                <h2 class="post-title">${escapeHtml(p.meta.title || p.slug)}</h2>
                                <p class="post-desc">${escapeHtml(p.meta.description || "")}</p>
                                <span class="read-link">→ 阅读全文</span>
                            </div>
                        </a>`;
                    }).join("")}
                </section>`;
            setupSearch(posts);
        }

        function setupSearch(posts) {
            const input = document.getElementById("search");
            const dropdown = document.getElementById("dropdown");
            let activeIdx = -1, matches = [];

            function close() { dropdown.hidden = true; dropdown.innerHTML = ""; activeIdx = -1; }

            function update() {
                const q = input.value;
                matches = searchPosts(posts, q);
                activeIdx = -1;
                if (!q.trim()) { close(); return; }
                if (!matches.length) {
                    dropdown.innerHTML = `<div class="dropdown-empty">没有匹配的文章</div>`;
                } else {
                    dropdown.innerHTML = matches.map((p, i) => {
                        const snip = snippetFor(p.body, q) || snippetFor(p.meta.description, q);
                        return `
                        <a class="dropdown-item" href="#/post/${p.slug}" data-idx="${i}">
                            <div class="d-title">${highlight(p.meta.title || p.slug, q)}</div>
                            ${snip ? `<div class="d-snippet">${snip}</div>` : ""}
                            <div class="d-meta">${fmtDate(p.meta.date)}${p.meta.category ? " · " + escapeHtml(p.meta.category) : ""}</div>
                        </a>`;
                    }).join("");
                }
                dropdown.hidden = false;
            }

            function setActive(i) {
                const items = dropdown.querySelectorAll(".dropdown-item");
                if (!items.length) return;
                activeIdx = (i + items.length) % items.length;
                items.forEach((el, idx) => el.classList.toggle("active", idx === activeIdx));
                items[activeIdx].scrollIntoView({ block: "nearest" });
            }

            input.addEventListener("input", update);
            input.addEventListener("keydown", e => {
                if (dropdown.hidden) return;
                if (e.key === "ArrowDown") { e.preventDefault(); setActive(activeIdx + 1); }
                else if (e.key === "ArrowUp") { e.preventDefault(); setActive(activeIdx - 1); }
                else if (e.key === "Enter" && activeIdx > -1 && matches[activeIdx]) {
                    e.preventDefault(); location.hash = `#/post/${matches[activeIdx].slug}`;
                } else if (e.key === "Escape") { input.blur(); close(); }
            });
            document.addEventListener("click", e => {
                if (!e.target.closest(".search")) close();
            });
        }

        function renderPost(posts, slug) {
            const post = posts.find(p => p.slug === slug);
            if (!post) { app.innerHTML = `<article><a class="back" href="#/">← 返回文章列表</a><p>没有找到这篇文章。</p></article>`; return; }
            app.innerHTML = `
                <article>
                    <a class="back" href="#/">← 返回文章列表</a>
                    <div class="post-meta" style="margin-top:24px">${fmtDate(post.meta.date)}${post.meta.category ? " · " + escapeHtml(post.meta.category) : ""}</div>
                    ${renderMarkdown(post.body)}
                </article>`;
            window.scrollTo(0, 0);
        }

        async function router() {
            const hash = location.hash || "#/";
            try {
                const posts = await loadPosts();
                const m = hash.match(/^#\/post\/(.+)$/);
                if (m) renderPost(posts, decodeURIComponent(m[1]));
                else renderList(posts);
            } catch (e) {
                app.innerHTML = `<p class="loading">文章加载失败。如果你是直接打开本地文件查看的，请运行 <code>python3 -m http.server</code>，然后访问 localhost:8000。</p>`;
            }
        }

        window.addEventListener("hashchange", router);
        router();
    </script>
</body>
</html>
