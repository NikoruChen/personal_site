<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>六格</title>
    <meta name="description" content="关于折腾、旅行，和我在读的书。">
    <style>
        :root {
            --bg: #ffffff;
            --text: #1a1a1a;
            --muted: #6b6b6b;
            --accent: #1a1a1a;
            --line: #ececec;
            --maxw: 880px;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #111111;
                --text: #ededed;
                --muted: #9a9a9a;
                --accent: #ffffff;
                --line: #262626;
            }
        }

        * { box-sizing: border-box; }

        html { -webkit-text-size-adjust: 100%; }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            font-size: 18px;
            line-height: 1.65;
            -webkit-font-smoothing: antialiased;
        }

        .wrap {
            max-width: var(--maxw);
            margin: 0 auto;
            padding: 0 24px;
        }

        /* Header */
        header {
            position: sticky;
            top: 0;
            z-index: 50;
            background: color-mix(in srgb, var(--bg) 88%, transparent);
            backdrop-filter: saturate(180%) blur(12px);
            -webkit-backdrop-filter: saturate(180%) blur(12px);
            border-bottom: 1px solid var(--line);
        }
        .header-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 64px;
        }

        .brand {
            font-weight: 800;
            font-size: 20px;
            letter-spacing: -0.01em;
            color: var(--text);
            text-decoration: none;
        }

        nav { display: flex; align-items: center; }
        nav a {
            color: var(--muted);
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            margin-left: 28px;
            transition: color 0.15s ease;
        }
        nav a:hover { color: var(--text); }
        nav a.active { color: var(--text); font-weight: 600; }

        /* Landing / hero */
        .hero {
            text-align: center;
            padding: 80px 0 64px;
            border-bottom: 1px solid var(--line);
        }
        .avatar {
            width: 116px;
            height: 116px;
            border-radius: 50%;
            margin: 0 auto 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Georgia, "Times New Roman", serif;
            font-size: 48px;
            font-weight: 700;
            color: #2a2a2a;
            background: transparent;
            overflow: hidden;
        }
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .hero h1 {
            font-size: 46px;
            line-height: 1.12;
            letter-spacing: -0.03em;
            margin: 0 0 18px;
            font-weight: 800;
        }
        .hero .lead {
            margin: 0 auto;
            max-width: 560px;
            color: var(--muted);
            font-size: 20px;
            line-height: 1.6;
        }
        .hero-actions {
            margin-top: 32px;
            display: flex;
            gap: 14px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            display: inline-block;
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
            padding: 12px 22px;
            border-radius: 999px;
            transition: opacity 0.15s ease, background 0.15s ease;
        }
        .btn-primary { background: var(--accent); color: var(--bg); }
        .btn-primary:hover { opacity: 0.85; }
        .btn-ghost { border: 1px solid var(--line); color: var(--text); }
        .btn-ghost:hover { background: var(--line); }

        /* Section intro on the posts page */
        .intro {
            padding: 56px 0 8px;
        }
        .intro h1 {
            font-size: 36px;
            line-height: 1.15;
            letter-spacing: -0.03em;
            margin: 0 0 12px;
            font-weight: 800;
        }
        .intro p {
            margin: 0;
            color: var(--muted);
            font-size: 18px;
        }

        @media (max-width: 600px) {
            .hero h1 { font-size: 34px; }
            .hero .lead { font-size: 18px; }
        }

        /* Post list (cards) */
        .posts {
            padding: 8px 0 64px;
            display: grid;
            gap: 32px;
        }

        .post-card {
            display: flex;
            text-decoration: none;
            color: inherit;
            border: 1px solid var(--line);
            border-radius: 16px;
            overflow: hidden;
            background: var(--bg);
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
            transition: box-shadow 0.18s ease, transform 0.18s ease;
        }
        .post-card:hover {
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.10);
            transform: translateY(-2px);
        }

        .card-banner {
            flex: 0 0 42%;
            align-self: stretch;
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
            color: #2a2a2a;
            background-size: cover;
            background-position: center;
        }
        .banner-icon { font-size: 46px; line-height: 1; }

        .card-body {
            flex: 1;
            min-width: 0;
            padding: 28px 30px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        @media (max-width: 640px) {
            .post-card { flex-direction: column; }
            .card-banner {
                flex: none;
                width: 100%;
                min-height: 0;
                aspect-ratio: 16 / 7;
            }
            .card-body { padding: 22px 24px 24px; }
        }

        .post-meta {
            font-size: 13px;
            letter-spacing: 0.04em;
            color: var(--muted);
            margin-bottom: 8px;
        }
        .post-title {
            font-size: 23px;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin: 0 0 10px;
            transition: color 0.15s ease;
        }
        .post-card:hover .post-title { color: var(--muted); }
        .post-desc {
            margin: 0 0 16px;
            color: var(--muted);
            font-size: 17px;
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .read-link {
            font-size: 15px;
            font-weight: 600;
            color: var(--text);
        }
        .post-card:hover .read-link { color: var(--muted); }

        /* Search */
        .search {
            position: relative;
            padding-top: 24px;
        }
        .search-input {
            width: 100%;
            font: inherit;
            font-size: 16px;
            color: var(--text);
            background: var(--bg);
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 12px 16px;
            outline: none;
        }
        .search-input::placeholder { color: var(--muted); }
        .search-input:focus { border-color: var(--muted); }

        .dropdown {
            position: absolute;
            left: 0;
            right: 0;
            top: calc(100% + 6px);
            background: var(--bg);
            border: 1px solid var(--line);
            border-radius: 10px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            z-index: 10;
        }
        .dropdown-item {
            display: block;
            text-decoration: none;
            color: inherit;
            padding: 12px 16px;
            border-bottom: 1px solid var(--line);
        }
        .dropdown-item:last-child { border-bottom: none; }
        .dropdown-item:hover,
        .dropdown-item.active { background: var(--line); }
        .dropdown-item .d-title {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 2px;
        }
        .dropdown-item .d-snippet {
            font-size: 14px;
            line-height: 1.5;
            color: var(--muted);
            margin-bottom: 4px;
        }
        .dropdown-item .d-meta {
            font-size: 12px;
            color: var(--muted);
        }
        .dropdown-empty {
            padding: 14px 16px;
            color: var(--muted);
            font-size: 15px;
        }
        .dropdown mark {
            background: transparent;
            color: var(--text);
            font-weight: 700;
        }

        /* Article reader */
        article {
            padding: 56px 0 80px;
        }
        article .post-meta { margin-bottom: 14px; }
        article h1 {
            font-size: 36px;
            line-height: 1.2;
            letter-spacing: -0.03em;
            margin: 0 0 32px;
            font-weight: 800;
        }
        article h2 {
            font-size: 24px;
            letter-spacing: -0.02em;
            margin: 40px 0 12px;
        }
        article p { margin: 0 0 20px; }
        article img { max-width: 100%; height: auto; border-radius: 12px; margin: 4px 0 24px; }
        article blockquote {
            margin: 0 0 20px;
            padding: 4px 18px;
            border-left: 3px solid var(--muted);
            color: var(--muted);
            background: rgba(0, 0, 0, 0.02);
            border-radius: 0 8px 8px 0;
        }
        article blockquote p { margin: 12px 0; }
        article ul, article ol { padding-left: 22px; margin: 0 0 20px; }
        article li { margin-bottom: 8px; }
        article hr { border: none; border-top: 1px solid var(--muted); opacity: 0.3; margin: 32px 0; }
        article code {
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
            font-size: 0.88em;
            background: rgba(0, 0, 0, 0.05);
            padding: 2px 6px;
            border-radius: 5px;
        }
        article strong { font-weight: 700; }
        article a { color: var(--text); }

        .back {
            display: inline-block;
            margin: 8px 0 8px;
            color: var(--muted);
            text-decoration: none;
            font-size: 15px;
        }
        .back:hover { color: var(--text); }

        footer {
            padding: 32px 0 56px;
            color: var(--muted);
            font-size: 14px;
        }
        footer a { color: var(--muted); text-decoration: none; }
        footer a:hover { color: var(--text); }

        .loading { color: var(--muted); padding: 40px 0; }

        @media (max-width: 600px) {
            article h1 { font-size: 28px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="wrap header-inner">
            <a class="brand" href="#/">六格</a>
            <nav>
                <a href="#/" data-route="home">首页</a>
                <a href="#/posts" data-route="posts">笔记</a>
            </nav>
        </div>
    </header>

    <div class="wrap">
        <main id="app">
            <p class="loading">加载中…</p>
        </main>

        <footer>
            <span>© <span id="year"></span> 六格</span>
        </footer>
    </div>

    <script>
        const POSTS_DIR = "posts";
        const app = document.getElementById("app");
        document.getElementById("year").textContent = new Date().getFullYear();

        // --- tiny markdown -> HTML (headings, lists, bold, links, paragraphs) ---
        function escapeHtml(s) {
            return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }
        function inline(s) {
            return escapeHtml(s)
                .replace(/`([^`]+)`/g, "<code>$1</code>")
                .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
                .replace(/~~(.+?)~~/g, "<del>$1</del>")
                .replace(/\*(.+?)\*/g, "<em>$1</em>")
                .replace(/!\[(.*?)\]\((.+?)\)/g, '<img src="$2" alt="$1">')
                .replace(/\[(.+?)\]\((.+?)\)/g, '<a href="$2">$1</a>');
        }
        function renderMarkdown(md) {
            const lines = md.split("\n");
            let html = "", inList = false, inOList = false, inQuote = false;
            const closeList = () => { if (inList) { html += "</ul>"; inList = false; } };
            const closeOList = () => { if (inOList) { html += "</ol>"; inOList = false; } };
            const closeQuote = () => { if (inQuote) { html += "</blockquote>"; inQuote = false; } };
            const closeBlocks = () => { closeList(); closeOList(); closeQuote(); };
            for (let raw of lines) {
                const line = raw.trimEnd();
                if (/^###\s+/.test(line)) { closeBlocks(); html += "<h3>" + inline(line.replace(/^###\s+/, "")) + "</h3>"; }
                else if (/^##\s+/.test(line)) { closeBlocks(); html += "<h2>" + inline(line.replace(/^##\s+/, "")) + "</h2>"; }
                else if (/^#\s+/.test(line)) { closeBlocks(); html += "<h1>" + inline(line.replace(/^#\s+/, "")) + "</h1>"; }
                else if (/^(-{3,}|\*{3,}|_{3,})$/.test(line)) { closeBlocks(); html += "<hr>"; }
                else if (/^>\s?/.test(line)) {
                    closeList(); closeOList();
                    if (!inQuote) { html += "<blockquote>"; inQuote = true; }
                    html += "<p>" + inline(line.replace(/^>\s?/, "")) + "</p>";
                }
                else if (/^[-*]\s+/.test(line)) {
                    closeOList(); closeQuote();
                    if (!inList) { html += "<ul>"; inList = true; }
                    html += "<li>" + inline(line.replace(/^[-*]\s+/, "")) + "</li>";
                }
                else if (/^\d+\.\s+/.test(line)) {
                    closeList(); closeQuote();
                    if (!inOList) { html += "<ol>"; inOList = true; }
                    html += "<li>" + inline(line.replace(/^\d+\.\s+/, "")) + "</li>";
                }
                else if (line.trim() === "") { closeBlocks(); }
                else { closeBlocks(); html += "<p>" + inline(line) + "</p>"; }
            }
            closeBlocks();
            return html;
        }

        // --- frontmatter parsing ---
        function parsePost(text) {
            const m = text.match(/^---\n([\s\S]*?)\n---\n?([\s\S]*)$/);
            const meta = {};
            let body = text;
            if (m) {
                m[1].split("\n").forEach(l => {
                    const i = l.indexOf(":");
                    if (i > -1) meta[l.slice(0, i).trim()] = l.slice(i + 1).trim();
                });
                body = m[2];
            }
            return { meta, body };
        }

        // Build a plain-text excerpt from the markdown body: drop the leading
        // title heading and markdown syntax, then take the opening lines.
        function excerpt(body, max = 150) {
            const text = (body || "")
                .replace(/^#{1,6}\s+.*$/gm, "")        // heading lines
                .replace(/!\[.*?\]\(.*?\)/g, "")       // images
                .replace(/^[-*]\s+/gm, "")             // bullet markers
                .replace(/^\d+\.\s+/gm, "")            // ordered markers
                .replace(/^>\s?/gm, "")                // blockquote markers
                .replace(/`([^`]+)`/g, "$1")           // inline code
                .replace(/\*\*(.+?)\*\*/g, "$1")       // bold
                .replace(/\*(.+?)\*/g, "$1")           // italic
                .replace(/\[(.+?)\]\(.+?\)/g, "$1")    // links -> text
                .replace(/\s+/g, " ")
                .trim();
            if (text.length <= max) return text;
            return text.slice(0, max).replace(/\s+\S*$/, "") + "…";
        }

        function fmtDate(s) {
            // Parse plain YYYY-MM-DD as a local date (not UTC) to avoid an
            // off-by-one day when the browser timezone is behind UTC.
            const ymd = /^(\d{4})-(\d{2})-(\d{2})$/.exec((s || "").trim());
            const d = ymd ? new Date(+ymd[1], +ymd[2] - 1, +ymd[3]) : new Date(s);
            if (isNaN(d)) return s;
            return d.toLocaleDateString("zh-CN", { year: "numeric", month: "long", day: "numeric" });
        }

        let cache = null;
        async function loadPosts() {
            if (cache) return cache;
            const files = await fetch(`${POSTS_DIR}/index.json`, { cache: "no-store" }).then(r => r.json());
            const posts = await Promise.all(files.map(async file => {
                const text = await fetch(`${POSTS_DIR}/${file}`, { cache: "no-store" }).then(r => r.text());
                const { meta, body } = parsePost(text);
                return { slug: file.replace(/\.md$/, ""), file, meta, body };
            }));
            posts.sort((a, b) => new Date(b.meta.date) - new Date(a.meta.date));
            cache = posts;
            return posts;
        }

        function highlight(text, query) {
            const safe = escapeHtml(text);
            if (!query) return safe;
            const i = text.toLowerCase().indexOf(query.toLowerCase());
            if (i < 0) return safe;
            return escapeHtml(text.slice(0, i)) +
                "<mark>" + escapeHtml(text.slice(i, i + query.length)) + "</mark>" +
                escapeHtml(text.slice(i + query.length));
        }

        // Split into "words": each CJK character is one word, latin/number runs are one word.
        function tokenize(text) {
            const tokens = [];
            const re = /[㐀-鿿぀-ヿ]|[A-Za-z0-9]+/g;
            let m;
            while ((m = re.exec(text)) !== null) {
                tokens.push({ start: m.index, end: m.index + m[0].length });
            }
            return tokens;
        }

        // Build a snippet: ~5 words before/after the match, with the match highlighted.
        function snippetFor(text, query, ctx = 5) {
            if (!text || !query) return null;
            const i = text.toLowerCase().indexOf(query.toLowerCase());
            if (i < 0) return null;
            const mStart = i, mEnd = i + query.length;
            const tokens = tokenize(text);
            let first = tokens.findIndex(t => t.end > mStart);
            let last = -1;
            for (let k = 0; k < tokens.length && tokens[k].start < mEnd; k++) last = k;
            if (first < 0) first = 0;
            if (last < 0) last = tokens.length - 1;
            let s = tokens.length ? tokens[Math.max(0, first - ctx)].start : 0;
            let e = tokens.length ? tokens[Math.min(tokens.length - 1, last + ctx)].end : text.length;
            s = Math.min(s, mStart);
            e = Math.max(e, mEnd);
            const clean = str => str.replace(/\s+/g, " ");
            return (s > 0 ? "…" : "") +
                escapeHtml(clean(text.slice(s, mStart))) +
                "<mark>" + escapeHtml(clean(text.slice(mStart, mEnd))) + "</mark>" +
                escapeHtml(clean(text.slice(mEnd, e))) +
                (e < text.length ? "…" : "");
        }

        function searchPosts(posts, query) {
            const q = query.trim().toLowerCase();
            if (!q) return [];
            return posts.filter(p => {
                const hay = [p.meta.title, p.meta.category, p.body]
                    .filter(Boolean).join(" ").toLowerCase();
                return hay.includes(q);
            });
        }

        // Banner look per category: icon + soft gradient background.
        const CARD_STYLES = {
            "随笔": { icon: "✍️", bg: "linear-gradient(135deg, #fdf0e3, #f6dcc4)" },
            "折腾": { icon: "🔧", bg: "linear-gradient(135deg, #e6eefb, #cfe0f6)" },
            "旅行": { icon: "✈️", bg: "linear-gradient(135deg, #e4f4ec, #c6e8d6)" },
            "阅读": { icon: "📖", bg: "linear-gradient(135deg, #f3e9fb, #e0cdf2)" },
        };
        const DEFAULT_STYLE = { icon: "📝", bg: "linear-gradient(135deg, #f0f0f0, #dcdcdc)" };
        function cardStyle(category) { return CARD_STYLES[category] || DEFAULT_STYLE; }

        let homeContent = null;
        async function loadHome() {
            if (homeContent) return homeContent;
            try {
                homeContent = await fetch("home.json", { cache: "no-store" }).then(r => r.json());
            } catch (e) {
                homeContent = {};
            }
            return homeContent;
        }

        async function renderHome() {
            const c = await loadHome();
            const headline = Array.isArray(c.headline) ? c.headline : [c.headline || "六格"];
            const cta = c.cta || {};
            const avatar = c.avatarImage
                ? `<img src="${escapeHtml(c.avatarImage)}" alt="${escapeHtml(c.avatar || "六")}">`
                : escapeHtml(c.avatar || "六");
            app.innerHTML = `
                <section class="hero">
                    <div class="avatar">${avatar}</div>
                    <h1>${headline.map(escapeHtml).join("<br>")}</h1>
                    <p class="lead">${escapeHtml(c.lead || "")}</p>
                    <div class="hero-actions">
                        <a class="btn btn-primary" href="${escapeHtml(cta.href || "#/posts")}">${escapeHtml(cta.label || "阅读笔记 →")}</a>
                    </div>
                </section>`;
            window.scrollTo(0, 0);
        }

        function renderList(posts) {
            app.innerHTML = `
                <div class="intro">
                    <h1>近期笔记</h1>
                </div>
                <div class="search">
                    <input class="search-input" type="search" id="search" placeholder="搜索笔记…" autocomplete="off">
                    <div class="dropdown" id="dropdown" hidden></div>
                </div>
                <section class="posts" style="padding-top:24px">
                    ${posts.map(p => {
                        const s = cardStyle(p.meta.category);
                        const banner = p.meta.image
                            ? `<div class="card-banner" style="background-image:url('${escapeHtml(p.meta.image)}')"></div>`
                            : `<div class="card-banner" style="background:${s.bg}"><div class="banner-icon">${s.icon}</div></div>`;
                        return `
                        <a class="post-card" href="#/post/${p.slug}">
                            ${banner}
                            <div class="card-body">
                                <div class="post-meta">${fmtDate(p.meta.date)}${p.meta.category ? " · " + escapeHtml(p.meta.category) : ""}</div>
                                <h2 class="post-title">${escapeHtml(p.meta.title || p.slug)}</h2>
                                <p class="post-desc">${escapeHtml(excerpt(p.body))}</p>
                                <span class="read-link">→ 阅读全文</span>
                            </div>
                        </a>`;
                    }).join("")}
                </section>`;
            setupSearch(posts);
        }

        function setupSearch(posts) {
            const input = document.getElementById("search");
            const dropdown = document.getElementById("dropdown");
            let activeIdx = -1, matches = [];

            function close() { dropdown.hidden = true; dropdown.innerHTML = ""; activeIdx = -1; }

            function update() {
                const q = input.value;
                matches = searchPosts(posts, q);
                activeIdx = -1;
                if (!q.trim()) { close(); return; }
                if (!matches.length) {
                    dropdown.innerHTML = `<div class="dropdown-empty">没有匹配的笔记</div>`;
                } else {
                    dropdown.innerHTML = matches.map((p, i) => {
                        const snip = snippetFor(p.body, q);
                        return `
                        <a class="dropdown-item" href="#/post/${p.slug}" data-idx="${i}">
                            <div class="d-title">${highlight(p.meta.title || p.slug, q)}</div>
                            ${snip ? `<div class="d-snippet">${snip}</div>` : ""}
                            <div class="d-meta">${fmtDate(p.meta.date)}${p.meta.category ? " · " + escapeHtml(p.meta.category) : ""}</div>
                        </a>`;
                    }).join("");
                }
                dropdown.hidden = false;
            }

            function setActive(i) {
                const items = dropdown.querySelectorAll(".dropdown-item");
                if (!items.length) return;
                activeIdx = (i + items.length) % items.length;
                items.forEach((el, idx) => el.classList.toggle("active", idx === activeIdx));
                items[activeIdx].scrollIntoView({ block: "nearest" });
            }

            input.addEventListener("input", update);
            input.addEventListener("keydown", e => {
                if (dropdown.hidden) return;
                if (e.key === "ArrowDown") { e.preventDefault(); setActive(activeIdx + 1); }
                else if (e.key === "ArrowUp") { e.preventDefault(); setActive(activeIdx - 1); }
                else if (e.key === "Enter" && activeIdx > -1 && matches[activeIdx]) {
                    e.preventDefault(); location.hash = `#/post/${matches[activeIdx].slug}`;
                } else if (e.key === "Escape") { input.blur(); close(); }
            });
            document.addEventListener("click", e => {
                if (!e.target.closest(".search")) close();
            });
        }

        function renderPost(posts, slug) {
            const post = posts.find(p => p.slug === slug);
            if (!post) { app.innerHTML = `<article><a class="back" href="#/posts">← 返回笔记列表</a><p>没有找到这篇笔记。</p></article>`; return; }
            app.innerHTML = `
                <article>
                    <a class="back" href="#/posts">← 返回笔记列表</a>
                    <div class="post-meta" style="margin-top:24px">${fmtDate(post.meta.date)}${post.meta.category ? " · " + escapeHtml(post.meta.category) : ""}</div>
                    ${renderMarkdown(post.body)}
                </article>`;
            window.scrollTo(0, 0);
        }

        function setActiveNav(hash) {
            const route = (hash.startsWith("#/posts") || hash.startsWith("#/post/")) ? "posts" : "home";
            document.querySelectorAll("nav a[data-route]").forEach(a => {
                a.classList.toggle("active", a.dataset.route === route);
            });
        }

        async function router() {
            const hash = location.hash || "#/";
            setActiveNav(hash);
            try {
                const m = hash.match(/^#\/post\/(.+)$/);
                if (m) {
                    const posts = await loadPosts();
                    renderPost(posts, decodeURIComponent(m[1]));
                } else if (hash.startsWith("#/posts")) {
                    const posts = await loadPosts();
                    renderList(posts);
                } else {
                    await renderHome();
                }
            } catch (e) {
                app.innerHTML = `<p class="loading">笔记加载失败。如果你是直接打开本地文件查看的，请运行 <code>python3 -m http.server</code>，然后访问 localhost:8000。</p>`;
            }
        }

        window.addEventListener("hashchange", router);
        router();
    </script>
</body>
</html>
